<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking – Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-card">

    <!-- Sidebar -->
    <div class="login-sidebar">
        <span class="sidebar-p">P</span>
        <span class="sidebar-brand">Parking<br>System</span>
    </div>

    <!-- Formulario -->
    <div class="login-panel">
        <p class="login-title">Acceso</p>
        <p class="login-subtitle">Sistema de gestión de estacionamiento</p>

        <!-- Error de credenciales -->
        <div class="alert-error" th:if="${param.error}">
            Usuario o contraseña incorrectos.
        </div>

        <!-- Mensaje de logout -->
        <div class="alert-error" style="background:#1a2a1a; border-color:#205a20; color:#70c070;"
             th:if="${param.logout}">
            Sesión cerrada correctamente.
        </div>

        <form action="/login" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username"
                       placeholder="nombre de usuario" autocomplete="username" required />
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••" autocomplete="current-password" required />
            </div>

            <button type="submit" class="btn-entrar">Entrar →</button>
        </form>
    </div>

</div>

</body>
</html>
