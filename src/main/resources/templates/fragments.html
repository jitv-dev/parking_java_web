<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>

<nav th:fragment="navbar(activePage)" class="navbar">
    <div class="nav-container">
        <div class="nav-brand">
            <div class="nav-p-icon">P</div>
            <span class="sidebar-brand nav-brand-text">Parking<br>System</span>
        </div>

        <ul class="nav-links">
            <li>
                <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">Dashboard</a>
            </li>
            <li>
                <a th:href="@{/history}" th:classappend="${activePage == 'history' ? 'active' : ''}">Historial</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/users}" th:classappend="${activePage == 'users' ? 'active' : ''}">Usuarios</a>
            </li>
        </ul>

        <div class="nav-actions">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión →</button>
            </form>
        </div>
    </div>
</nav>

</body>
</html>
